version: "3.8"

services:
  backend:
    image: openjdk:17-jdk-slim
    container_name: agri-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "chmod +x mvnw && ./mvnw clean package && java -jar target/*.jar"
    ports:
      - "8080:8080"
    environment:
      - GROQ_API_KEY=your_api_key_here
    restart: always

  frontend:
    image: node:18
    container_name: agri-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run build && npm install -g serve && serve -s dist -l 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always
